<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="femaleBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d946ef;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="url(#femaleBg)"/>
  
  <!-- Head -->
  <circle cx="100" cy="60" r="32" fill="#fdd7c0"/>
  
  <!-- Hair -->
  <path d="M 68 58 Q 68 24 100 24 Q 132 24 132 58" fill="#3d2817" stroke="none"/>
  <path d="M 68 58 Q 60 65 62 90 Q 65 100 75 105" fill="#3d2817" stroke="none"/>
  <path d="M 132 58 Q 140 65 138 90 Q 135 100 125 105" fill="#3d2817" stroke="none"/>
  
  <!-- Neck -->
  <rect x="94" y="88" width="12" height="12" fill="#fdd7c0"/>
  
  <!-- Body -->
  <ellipse cx="100" cy="130" rx="40" ry="45" fill="#fff5f0"/>
  
  <!-- Eyes -->
  <ellipse cx="90" cy="58" rx="3" ry="4" fill="#2d2416"/>
  <ellipse cx="110" cy="58" rx="3" ry="4" fill="#2d2416"/>
  
  <!-- Eye shine -->
  <circle cx="91" cy="57" r="1" fill="white"/>
  <circle cx="111" cy="57" r="1" fill="white"/>
  
  <!-- Eyebrows -->
  <path d="M 86 51 Q 90 48 94 51" stroke="#2d2416" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 106 51 Q 110 48 114 51" stroke="#2d2416" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  
  <!-- Nose -->
  <line x1="100" y1="62" x2="100" y2="70" stroke="#e8b4a0" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Mouth -->
  <path d="M 88 76 Q 100 82 112 76" stroke="#e8788a" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Blush -->
  <circle cx="78" cy="68" r="6" fill="#ffc0d9" opacity="0.5"/>
  <circle cx="122" cy="68" r="6" fill="#ffc0d9" opacity="0.5"/>
