<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <circle cx="120" cy="120" r="120" fill="#ede0ff"/>
  <!-- Body / white top -->
  <path d="M40 240 Q40 192 120 186 Q200 192 200 240" fill="#f0eeee"/>
  <!-- Neck -->
  <rect x="106" y="155" width="28" height="30" rx="14" fill="#f5b98c"/>
  <!-- Hair back -->
  <ellipse cx="120" cy="88" rx="67" ry="60" fill="#1b2e50"/>
  <!-- Hair sides flowing down -->
  <path d="M55 115 Q42 150 50 178 Q56 196 68 202" stroke="#1b2e50" stroke-width="30" stroke-linecap="round" fill="none"/>
  <path d="M185 115 Q198 150 190 178 Q184 196 172 202" stroke="#1b2e50" stroke-width="30" stroke-linecap="round" fill="none"/>
  <!-- Face -->
  <ellipse cx="120" cy="110" rx="52" ry="55" fill="#f6c09c"/>
  <!-- Hair front part -->
  <path d="M70 96 Q76 62 120 66 Q164 62 170 96 Q152 80 120 82 Q88 80 70 96Z" fill="#1b2e50"/>
  <!-- Eyebrows -->
  <path d="M90 96 Q100 92 110 96" stroke="#2d1a0a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M130 96 Q140 92 150 96" stroke="#2d1a0a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Eye whites -->
  <ellipse cx="99" cy="108" rx="9" ry="9.5" fill="white"/>
  <ellipse cx="141" cy="108" rx="9" ry="9.5" fill="white"/>
  <!-- Irises -->
  <circle cx="100" cy="109" r="6" fill="#2b4a8c"/>
  <circle cx="142" cy="109" r="6" fill="#2b4a8c"/>
  <!-- Pupils -->
  <circle cx="100" cy="110" r="3.5" fill="#1a1a2e"/>
  <circle cx="142" cy="110" r="3.5" fill="#1a1a2e"/>
  <!-- Eye shine -->
  <circle cx="102" cy="107" r="1.8" fill="white"/>
  <circle cx="144" cy="107" r="1.8" fill="white"/>
  <!-- Lashes -->
  <path d="M90 104 L88 100 M93 103 L92 98 M96 102 L96 97" stroke="#1a1a2e" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M150 104 L152 100 M147 103 L148 98 M144 102 L144 97" stroke="#1a1a2e" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M115 122 Q120 130 125 122" stroke="#e09060" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Upper lip -->
  <path d="M105 136 Q112 132 120 134 Q128 132 135 136" stroke="#d4705a" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Lower lip -->
  <path d="M105 136 Q120 144 135 136" fill="#f0917c" stroke="#d4705a" stroke-width="1" stroke-linejoin="round"/>
  <!-- Blush -->
  <ellipse cx="88" cy="122" rx="12" ry="7" fill="#ffb5c0" opacity="0.45"/>
  <ellipse cx="152" cy="122" rx="12" ry="7" fill="#ffb5c0" opacity="0.45"/>
</svg>
