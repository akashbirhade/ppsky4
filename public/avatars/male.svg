<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <circle cx="120" cy="120" r="120" fill="#e4ecf5"/>
  <!-- Body / dark hoodie -->
  <path d="M28 240 Q28 190 120 184 Q212 190 212 240" fill="#2a2a2a"/>
  <path d="M55 184 Q80 178 120 184 Q160 178 185 184 Q165 200 120 202 Q75 200 55 184" fill="#1e1e1e"/>
  <!-- Neck -->
  <rect x="107" y="155" width="26" height="28" rx="12" fill="#e8a06a"/>
  <!-- Curly hair clusters -->
  <ellipse cx="120" cy="80" rx="60" ry="52" fill="#3a2010"/>
  <circle cx="78" cy="74" r="18" fill="#3a2010"/>
  <circle cx="88" cy="64" r="16" fill="#3a2010"/>
  <circle cx="100" cy="59" r="15" fill="#3a2010"/>
  <circle cx="115" cy="57" r="15" fill="#3a2010"/>
  <circle cx="130" cy="59" r="15" fill="#3a2010"/>
  <circle cx="145" cy="64" r="14" fill="#3a2010"/>
  <circle cx="156" cy="75" r="16" fill="#3a2010"/>
  <!-- Face -->
  <ellipse cx="120" cy="110" rx="50" ry="53" fill="#f0a872"/>
  <!-- Beard -->
  <path d="M76 135 Q82 162 120 168 Q158 162 164 135 Q150 148 120 150 Q90 148 76 135Z" fill="#3a2010" opacity="0.85"/>
  <!-- Mustache -->
  <path d="M105 128 Q112 132 120 130 Q128 132 135 128" stroke="#3a2010" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.9"/>
  <!-- Sideburns -->
  <rect x="70" y="112" width="9" height="26" rx="4" fill="#3a2010" opacity="0.7"/>
  <rect x="161" y="112" width="9" height="26" rx="4" fill="#3a2010" opacity="0.7"/>
  <!-- Eyebrows -->
  <path d="M86 90 Q98 86 108 90" stroke="#2a1508" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M132 90 Q142 86 154 90" stroke="#2a1508" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Glasses lens fill -->
  <circle cx="100" cy="106" r="19" fill="white" fill-opacity="0.22"/>
  <circle cx="140" cy="106" r="19" fill="white" fill-opacity="0.22"/>
  <!-- Eyes -->
  <circle cx="100" cy="106" r="7.5" fill="#8c6330"/>
  <circle cx="140" cy="106" r="7.5" fill="#8c6330"/>
  <circle cx="100" cy="107" r="4.5" fill="#2a1a08"/>
  <circle cx="140" cy="107" r="4.5" fill="#2a1a08"/>
  <!-- Eye shine -->
  <circle cx="102" cy="104" r="2" fill="white"/>
  <circle cx="142" cy="104" r="2" fill="white"/>
  <!-- Glasses frames -->
  <circle cx="100" cy="106" r="19" fill="none" stroke="#333" stroke-width="4.5"/>
  <circle cx="140" cy="106" r="19" fill="none" stroke="#333" stroke-width="4.5"/>
  <!-- Bridge -->
  <line x1="119" y1="106" x2="121" y2="106" stroke="#333" stroke-width="4" stroke-linecap="round"/>
  <!-- Arms -->
  <line x1="72" y1="98" x2="81" y2="105" stroke="#333" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="168" y1="98" x2="159" y2="105" stroke="#333" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M115 120 Q120 128 125 120" stroke="#d08040" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Smile / teeth hint -->
  <path d="M106 135 Q120 145 134 135" fill="none" stroke="#c87840" stroke-width="2" stroke-linecap="round"/>
  <path d="M108 135 Q120 143 132 135" fill="white" opacity="0.6"/>
</svg>
