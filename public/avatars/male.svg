<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="maleBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="url(#maleBg)"/>
  
  <!-- Head -->
  <circle cx="100" cy="60" r="32" fill="#e8b4a0"/>
  
  <!-- Hair -->
  <path d="M 68 60 Q 68 28 100 28 Q 132 28 132 60" fill="#2d2416" stroke="none"/>
  
  <!-- Neck -->
  <rect x="94" y="88" width="12" height="12" fill="#e8b4a0"/>
  
  <!-- Body -->
  <ellipse cx="100" cy="130" rx="40" ry="45" fill="#e8e8e8"/>
  
  <!-- Eyes -->
  <circle cx="90" cy="56" r="3.5" fill="#2d2416"/>
  <circle cx="110" cy="56" r="3.5" fill="#2d2416"/>
  
  <!-- Eyebrows -->
  <path d="M 86 50 Q 90 48 94 50" stroke="#2d2416" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 106 50 Q 110 48 114 50" stroke="#2d2416" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Nose -->
  <line x1="100" y1="60" x2="100" y2="68" stroke="#d4a090" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Mouth -->
